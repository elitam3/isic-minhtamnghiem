<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moje ISIC Karta</title>
    
    <!-- Sjednocený a čistý font Inter pro celou aplikaci -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .logo-wave {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .floating-logo {
            position: absolute;
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
            opacity: 0;
            animation: holographicFlash 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes holographicFlash {
            0% { opacity: 0; filter: drop-shadow(0 0 0 transparent); }
            10% {
                opacity: 1;
                filter: drop-shadow(-2px -2px 4px var(--c1)) drop-shadow(2px 2px 4px var(--c2)) drop-shadow(0 0 8px var(--c3));    
            }
            40% { opacity: 0; filter: drop-shadow(0 0 0 transparent); }
            100% { opacity: 0; }
        }

        .logo-wave::after {
            content: '';
            position: absolute;
            inset: -40%;
            background: linear-gradient(
                115deg, transparent 35%, rgba(255,255,255,0.12) 48%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0.12) 52%, transparent 65%
            );
            animation: sweep 4s linear infinite;
        }

        @keyframes sweep {
            from { transform: translateX(-60%) translateY(-10%) rotate(8deg); }
            to { transform: translateX(60%) translateY(10%) rotate(8deg); }
        }
    </style>
</head>
<body class="bg-neutral-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [time, setTime] = useState(new Date());
            const [activeSlide, setActiveSlide] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const formatTime = () => {
                const d = time;
                const date = `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
                const timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
                return `${date} | ${timeStr}`;
            };

            const logos = [
                { left: '70%', top: '90%', delay: 0.0, rotation: -45, colors: ['#00ffcc99', '#0066ff99', '#cc00ff99'] },
                { left: '15%', top: '80%', delay: 0.5, rotation: 75,  colors: ['#ff69b499', '#00c8ff99', '#b464ff99'] },
                { left: '85%', top: '65%', delay: 1.0, rotation: -30, colors: ['#6496ff99', '#c864ff99', '#9664ff99'] },
                { left: '45%', top: '50%', delay: 1.5, rotation: 10,  colors: ['#00ffcc99', '#0066ff99', '#cc00ff99'] },
                { left: '10%', top: '38%', delay: 2.0, rotation: -60, colors: ['#ff336699', '#ff993399', '#ff00cc99'] },
                { left: '88%', top: '25%', delay: 2.5, rotation: 30,  colors: ['#ff69b499', '#9664ff99', '#00c8ff99'] },
                { left: '30%', top: '15%', delay: 3.0, rotation: 45,  colors: ['#00ffcc99', '#cc00ff99', '#6496ff99'] },
                { left: '80%', top: '5%',  delay: 3.5, rotation: -15, colors: ['#c864ff99', '#ff336699', '#ff993399'] }
            ];

            // Loga pro druhý slide 
            const logosSlide2 = [
                { left: '10%', top: '75%', delay: 0.0, rotation: 45,  colors: ['#00ffcc99', '#cc00ff99', '#6496ff99'] },
                { left: '25%', top: '25%', delay: 0.5, rotation: -15, colors: ['#c864ff99', '#ff336699', '#ff993399'] },
                { left: '40%', top: '65%', delay: 1.0, rotation: -45, colors: ['#00ffcc99', '#0066ff99', '#cc00ff99'] },
                { left: '55%', top: '35%', delay: 1.5, rotation: 75,  colors: ['#ff69b499', '#00c8ff99', '#b464ff99'] },
                { left: '70%', top: '80%', delay: 2.0, rotation: -30, colors: ['#6496ff99', '#c864ff99', '#9664ff99'] },
                { left: '85%', top: '20%', delay: 2.5, rotation: 10,  colors: ['#00ffcc99', '#0066ff99', '#cc00ff99'] },
                { left: '95%', top: '50%', delay: 3.0, rotation: -60, colors: ['#ff336699', '#ff993399', '#ff00cc99'] }
            ];

            const getSlideClass = (index) => {
                if (activeSlide === index) return 'opacity-100 z-10 translate-x-0';
                if (activeSlide > index) return 'opacity-0 z-0 -translate-x-12 pointer-events-none';
                return 'opacity-0 z-0 translate-x-12 pointer-events-none';
            };

            return (
                <div className="min-h-screen flex justify-center select-none">
                    <div className="w-full max-w-[420px] min-h-screen bg-black flex flex-col relative overflow-x-hidden overflow-y-auto">
                        
                        {/* Top Header Bar */}
                        <div className="mt-8 mx-4 shrink-0 h-12 bg-[#121225] rounded-lg flex items-center justify-between px-4 z-20 shadow-lg">
                            <div className="flex items-center gap-3">
                                <i data-lucide="chevron-left" className="text-white w-5 h-5"></i>
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 bg-[#4ade80] rounded-full shadow-[0_0_10px_#4ade80]" />
                                    <span className="text-white font-bold text-sm tracking-tight text-shadow">VALID</span>
                                </div>
                            </div>
                            <div className="text-white text-[13px] font-medium opacity-90">
                                {formatTime()}
                            </div>
                        </div>

                        {/* Slidy kontejner */}
                        <div className="w-full px-4 pt-4 flex-1 flex flex-col items-center">
                            <div className="relative w-full max-w-[343px] h-[540px] shrink-0">
                                
                                {/* ========================================================= */}
                                {/* SLIDE 1: PŮVODNÍ VERTIKÁLNÍ KARTA                           */}
                                {/* ========================================================= */}
                                <div className={`absolute inset-0 bg-[#49c3c3] rounded-[16px] overflow-hidden shadow-2xl flex flex-col transition-all duration-500 ease-out ${getSlideClass(0)}`}>
                                    {/* Pozadí Slide 1 */}
                                    <div className="absolute inset-0 z-0 pointer-events-none overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-[38%] bg-gradient-to-b from-white via-[#dcf5f5] to-transparent z-0" />
                                        <div className="absolute -top-[10%] -right-[20%] w-[120%] h-[45%] bg-white/40 rounded-[100%] blur-[1px] z-10" />
                                        <div className="absolute top-[12%] -left-[15%] w-[80%] h-[35%] bg-[#a5e8e8]/30 rounded-[100%] blur-[1px] z-10" />
                                        <div className="absolute top-[25%] left-0 w-full h-[25%] bg-gradient-to-br from-white/20 to-transparent z-10" style={{ clipPath: 'polygon(0 0, 100% 30%, 100% 100%, 0 70%)' }} />
                                        
                                        <div className="absolute top-0 left-0 w-full h-[66px] bg-[#2ca8a8] z-20" style={{ clipPath: 'polygon(0 0, 100% 0, 100% 58px, 0 100%)' }} />
                                        <div className="absolute top-[160px] left-0 w-full bottom-0 bg-[#2ca8a8] z-20" />
                                    </div>

                                    {/* ISIC animace (Slide 1) */}
                                    <div className="logo-wave z-40">
                                        {logos.map((logo, i) => (
                                            <div key={`s1-${i}`} className="floating-logo" style={{ left: logo.left, top: logo.top, '--c1': logo.colors[0], '--c2': logo.colors[1], '--c3': logo.colors[2], transform: `translate(-50%, -50%) rotate(${logo.rotation}deg)` }}>
                                                <img src="https://i.imgur.com/whz8ix9.png" style={{ animationDelay: `${logo.delay}s` }} />
                                            </div>
                                        ))}
                                    </div>

                                    {/* Obsah Slide 1 */}
                                    <div className="relative z-20 h-full flex flex-col">
                                        <div className="flex justify-between items-start pt-0 px-0">
                                            <div className="ml-3 drop-shadow-md">
                                                <div className="bg-white px-[12px] pt-[21px] pb-[18px] flex items-center justify-center rounded-b-[2px]" style={{ clipPath: 'polygon(0 0, 100% 0, 100% 88%, 0 100%)' }}>
                                                    <img src="https://i.imgur.com/Zz0z7tL.png" className="h-[41px] object-contain" />
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2.5 pt-[24px] pr-3">
                                                <img src="https://i.imgur.com/1CYdrWQ.png" className="h-6 object-contain grayscale mix-blend-multiply opacity-80" />
                                                <div className="flex flex-col justify-center">
                                                    <span className="text-[#042a2b] text-[7.5px] font-bold uppercase tracking-tight leading-none mb-[2px]">ISIC card number</span>
                                                    <span className="text-[#042a2b] text-[12px] font-extrabold tracking-tight leading-none">S 420 301 234 709 P</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex justify-center mt-[32px]">
                                            <div className="w-[90px] h-[105px] rounded-[10px] overflow-hidden shadow-xl">
                                                <img src="https://i.imgur.com/gW0g7QK.jpeg" className="w-full h-full object-cover rounded-[8px]" />
                                            </div>
                                        </div>
                                        <div className="text-center mt-3 text-white">
                                            <h1 className="text-[22px] font-extrabold tracking-tight leading-none drop-shadow-sm">Minh Tam Nghiemová</h1>
                                            <p className="text-[14px] font-semibold opacity-90 mt-1 drop-shadow-sm">NEWTON University</p>
                                        </div>
                                        <div className="grid grid-cols-2 mt-5 mb-2 px-8">
                                            <div className="flex flex-col items-center border-r border-[#005a5c]/20">
                                                <span className="text-[#005a5c] text-[9px] font-bold uppercase opacity-80 mb-1">Platnost | Validity</span>
                                                <span className="text-white text-[15px] font-black drop-shadow-sm">12/2026</span>
                                            </div>
                                            <div className="flex flex-col items-center">
                                                <span className="text-[#005a5c] text-[9px] font-bold uppercase opacity-80 mb-1">Narozen (a) | Born</span>
                                                <span className="text-white text-[15px] font-black drop-shadow-sm">31/05/2003</span>
                                            </div>
                                        </div>
                                        <div className="flex-1 flex items-end justify-center pb-8 pt-1">
                                            <div className="bg-white p-3 rounded-[16px] shadow-xl">
                                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=ISIC" className="w-[100px] h-[100px]" />
                                            </div>
                                        </div>
                                    </div>
                                </div>


                                {/* ========================================================= */}
                                {/* SLIDE 2: HORIZONTÁLNÍ KARTA (-90deg rotace)                 */}
                                {/* ========================================================= */}
                                <div className={`absolute inset-0 flex items-center justify-center transition-all duration-500 ease-out ${getSlideClass(1)}`}>
                                    <div className="relative w-[540px] h-[calc(100vw-32px)] max-h-[343px] rotate-[-90deg] bg-[#49c3c3] rounded-[16px] overflow-hidden shadow-2xl flex flex-col shrink-0">
                                        
                                        {/* 1. Pozadí */}
                                        <div className="absolute inset-0 z-0 pointer-events-none overflow-hidden">
                                            <div className="absolute inset-0" style={{ clipPath: 'polygon(0 0, 100% 30%, 80% 100%, 0 70%)', background: 'rgba(255,255,255,0.15)' }} />
                                            
                                            <div className="absolute" style={{ left: '-150px', top: '-100px', width: '500px', height: '500px', borderRadius: '50%', background: 'rgba(255, 255, 255, 0.45)' }} />
                                            
                                            <div className="absolute" style={{ right: '-120px', bottom: '-150px', width: '400px', height: '400px', background: 'rgba(255, 255, 255, 0.3)', borderRadius: '50%' }} />
                                        </div>

                                        {/* 2. Zkosený tyrkysový Header Blok (Z-10) */}
                                        {/* Výška 130px - zkosení na pravé straně zostřeno na 85px pro decentně agresivnější look */}
                                        <div className="absolute top-0 left-0 w-full h-[130px] bg-[#2ca8a8] z-10 pointer-events-none" style={{ clipPath: 'polygon(0 0, 100% 0, 100% 85px, 0 100%)' }} />

                                        {/* 3. Content Area - Z-20 (Texty a fotka) */}
                                        <div className="absolute inset-0 z-20">
                                            {/* Hlavní Tělo (Grid Layout) - horní padding zvětšen o 30px na 175px pro posun údajů níže */}
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 140px', gap: '24px', padding: '175px 28px 28px 48px' }} className="h-full w-full">
                                                
                                                {/* Levý textový blok */}
                                                <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '1px' }}>
                                                        <span className="text-[#005a5c] text-[10px] font-bold uppercase opacity-90">Jméno</span>
                                                        <span className="text-[#021f20] text-[19px] font-black leading-none tracking-tight">Minh Tam Nghiemová</span>
                                                    </div>
                                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '1px' }}>
                                                        <span className="text-[#005a5c] text-[10px] font-bold uppercase opacity-90">Univerzita</span>
                                                        <span className="text-[#021f20] text-[19px] font-black leading-none tracking-tight">NEWTON University</span>
                                                    </div>
                                                    <div className="flex gap-10">
                                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1px' }}>
                                                            <span className="text-[#005a5c] text-[10px] font-bold uppercase opacity-90">Platnost</span>
                                                            <span className="text-[#021f20] text-[19px] font-black leading-none tracking-tight">12/2026</span>
                                                        </div>
                                                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1px' }}>
                                                            <span className="text-[#005a5c] text-[10px] font-bold uppercase opacity-90">Narozen (a)</span>
                                                            <span className="text-[#021f20] text-[19px] font-black leading-none tracking-tight">31/05/2003</span>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Fotografie - marginTop upraven na -105px, aby startovala na ~70px (cca 10px pod čísly) i při posunutém paddingu gridu */}
                                                <img 
                                                    src="https://i.imgur.com/gW0g7QK.jpeg" 
                                                    className="object-cover rounded-[6px]" 
                                                    style={{ width: '140px', height: '180px', boxShadow: '0 12px 24px rgba(0,0,0,0.15)', alignSelf: 'start', marginTop: '-105px' }} 
                                                />
                                            </div>
                                        </div>

                                        {/* 4. Hlavička Metadata a Logo Box (Z-30) */}
                                        <div className="absolute inset-0 z-30 pointer-events-none">
                                            {/* Zvětšený bílý ISIC Logo Box - pb zvětšeno na 60px, aby lépe ladilo s ostřejším zkosením headeru */}
                                            <div className="absolute top-0 left-4 drop-shadow-md">
                                                <div className="bg-white px-[16px] pt-[40px] pb-[60px] flex items-center justify-center rounded-b-[4px]" style={{ clipPath: 'polygon(0 0, 100% 0, 100% 82%, 0 100%)' }}>
                                                    <img src="https://i.imgur.com/Zz0z7tL.png" className="h-[65px] object-contain" />
                                                </div>
                                            </div>

                                            {/* Metadata vpravo nahoře */}
                                            <div className="absolute top-[32px] right-[24px] flex items-center gap-3.5">
                                                <img src="https://i.imgur.com/1CYdrWQ.png" className="h-[28px] object-contain grayscale mix-blend-multiply opacity-80" />
                                                <div className="flex flex-col items-start text-[#042a2b]">
                                                    <span className="text-[10px] font-bold uppercase opacity-70 mb-[2px]">ISIC card number</span>
                                                    <span className="text-[20px] font-bold tracking-[0.08em] leading-none">S 420 301 234 709 P</span>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 5. ISIC animace (Z-40) */}
                                        <div className="logo-wave z-40">
                                            {logosSlide2.map((logo, i) => (
                                                <div key={`s2-${i}`} className="floating-logo" style={{ left: logo.left, top: logo.top, '--c1': logo.colors[0], '--c2': logo.colors[1], '--c3': logo.colors[2], transform: `translate(-50%, -50%) rotate(${logo.rotation}deg)` }}>
                                                    <img src="https://i.imgur.com/whz8ix9.png" style={{ animationDelay: `${logo.delay}s` }} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>


                                {/* ========================================================= */}
                                {/* SLIDE 3: STARÁ VERZE (UPDATE APP)                           */}
                                {/* ========================================================= */}
                                <div className={`absolute inset-0 bg-neutral-900/95 rounded-[16px] border border-white/10 flex flex-col items-center justify-center shadow-2xl transition-all duration-500 ease-out p-6 ${getSlideClass(2)}`}>
                                    <div className="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-5">
                                        <i data-lucide="refresh-cw" className="w-8 h-8 text-[#43c4c7]"></i>
                                    </div>
                                    <h2 className="text-white text-[22px] font-bold tracking-tight mb-2">Stará verze průkazu</h2>
                                    <p className="text-neutral-400 text-[14px] font-medium text-center mb-8 leading-relaxed max-w-[250px]">
                                        Tento formát průkazu již není podporován. Aktualizuj si prosím aplikaci pro zobrazení nového designu karet.
                                    </p>
                                    <button className="bg-[#43c4c7] text-[#042a2b] px-6 py-3 rounded-full font-bold text-[14px] shadow-lg shadow-[#43c4c7]/20 flex items-center gap-2 hover:bg-[#34a2a5] transition-colors active:scale-95 cursor-pointer">
                                        <i data-lucide="arrow-up-circle" className="w-5 h-5"></i>
                                        Aktualizovat aplikaci
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Footer Area */}
                        <div className="mt-6 pb-12 flex flex-col items-center gap-6 shrink-0 z-20">
                            {/* Pagination Dots */}
                            <div className="flex gap-3">
                                {[0, 1, 2].map((index) => (
                                    <button 
                                        key={index}
                                        onClick={() => setActiveSlide(index)}
                                        className={`rounded-full transition-all duration-300 ${activeSlide === index ? 'w-2.5 h-2.5 bg-[#43c4c7] shadow-[0_0_8px_#43c4c7] scale-110' : 'w-2.5 h-2.5 bg-[#3d3d5c] hover:bg-[#52527a]'}`}
                                        aria-label={`Přepnout na slide ${index + 1}`}
                                    />
                                ))}
                            </div>

                            <p className="text-neutral-500 text-[13px] font-medium tracking-wide">Swipe through pages</p>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
