<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje ISIC Karta</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Animace a speciální efekty */
        .logo-wave {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 30;
        }

        .floating-logo {
            position: absolute;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-logo img {
            width: 100%;
            height: auto;
            opacity: 0;
            animation: holographicFlash 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes holographicFlash {
            0% { opacity: 0; filter: drop-shadow(0 0 0 transparent); }
            10% { opacity: 0.8; filter: drop-shadow(-2px -2px 4px var(--c1)) drop-shadow(2px 2px 4px var(--c2)); }
            40% { opacity: 0; }
            100% { opacity: 0; }
        }

        .logo-wave::after {
            content: '';
            position: absolute;
            inset: -40%;
            background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.2) 50%, transparent 65%);
            animation: sweep 4s linear infinite;
        }

        @keyframes sweep {
            from { transform: translateX(-60%) translateY(-10%) rotate(8deg); }
            to { transform: translateX(60%) translateY(10%) rotate(8deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [time, setTime] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const formatTime = () => {
                const d = time;
                const date = `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
                const timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
                return `${date} | ${timeStr}`;
            };

            const logos = [
                { x: 50, y: 450, delay: 0.3, rotation: 75, colors: ['#ff69b4', '#00c8ff', '#b464ff'] },
                { x: 160, y: 340, delay: 0.6, rotation: -30, colors: ['#6496ff', '#c864ff', '#9664ff'] },
                { x: 280, y: 250, delay: 0.9, rotation: 10, colors: ['#00ffcc', '#0066ff', '#cc00ff'] },
                { x: 20, y: 260, delay: 1.2, rotation: -60, colors: ['#ff3366', '#ff9933', '#ff00cc'] },
                { x: 140, y: 150, delay: 1.5, rotation: 30, colors: ['#ff69b4', '#9664ff', '#00c8ff'] },
                { x: 30, y: 70, delay: 1.8, rotation: 45, colors: ['#00ffcc', '#cc00ff', '#6496ff'] },
                { x: 260, y: 40, delay: 2.1, rotation: -15, colors: ['#c864ff', '#ff3366', '#ff9933'] },
            ];

            return (
                <div className="min-h-screen bg-neutral-950 flex justify-center font-sans select-none">
                    <div className="w-full max-w-[420px] min-h-screen bg-black flex flex-col relative overflow-hidden">
                        
                        {/* Header */}
                        <div className="mt-8 mx-4 h-12 bg-[#121225] rounded-lg flex items-center justify-between px-4 z-20 shadow-lg">
                            <div className="flex items-center gap-3">
                                <i data-lucide="chevron-left" className="text-white w-5 h-5"></i>
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 bg-[#4ade80] rounded-full shadow-[0_0_10px_#4ade80]" />
                                    <span className="text-white font-bold text-sm tracking-tight">VALID</span>
                                </div>
                            </div>
                            <div className="text-white text-[13px] font-medium opacity-90">
                                {formatTime()}
                            </div>
                        </div>

                        {/* Card */}
                        <div className="flex-1 px-4 pt-4 relative">
                            <div className="relative w-full h-[540px] bg-[#49c3c3] rounded-[16px] overflow-hidden shadow-2xl flex flex-col">
                                
                                {/* Background Layers */}
                                <div className="absolute inset-0 z-0 pointer-events-none">
                                    <div className="absolute top-0 left-0 w-full h-[38%] bg-gradient-to-b from-white/40 to-transparent" />
                                    <div className="absolute top-0 left-0 w-full h-[54px] bg-[#2ca8a8]" style={{ clipPath: 'polygon(0 0, 100% 0, 100% 40px, 0 100%)' }} />
                                    <div className="absolute top-[160px] left-0 w-full bottom-0 bg-[#2ca8a8]" />
                                </div>

                                {/* Holographic Logos */}
                                <div className="logo-wave">
                                    {logos.map((logo, i) => (
                                        <div key={i} className="floating-logo" style={{
                                            left: logo.x, top: logo.y,
                                            '--c1': logo.colors[0], '--c2': logo.colors[1], '--c3': logo.colors[2],
                                            transform: `translate(-50%, -50%) rotate(${logo.rotation}deg)`
                                        }}>
                                            <img src="https://i.imgur.com/whz8ix9.png" style={{ animationDelay: `${logo.delay}s` }} />
                                        </div>
                                    ))}
                                </div>

                                {/* Content */}
                                <div className="relative z-20 h-full flex flex-col">
                                    <div className="flex justify-between items-start pt-0 px-0">
                                        <div className="ml-3 bg-white px-2.5 pt-1.5 pb-4 rounded-b-[2px]" style={{ clipPath: 'polygon(0 0, 100% 0, 100% 75%, 0 100%)' }}>
                                            <img src="https://i.imgur.com/Zz0z7tL.png" className="h-9" />
                                        </div>
                                        <div className="flex items-center gap-2.5 pt-3 pr-3 text-[#042a2b]">
                                            <img src="https://i.imgur.com/1CYdrWQ.png" className="h-6 grayscale opacity-80" />
                                            <div className="flex flex-col">
                                                <span className="text-[7.5px] font-bold uppercase">ISIC card number</span>
                                                <span className="text-[12px] font-extrabold">S 420 301 234 709 P</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex justify-center mt-[44px]">
                                        <img src="https://i.imgur.com/gW0g7QK.jpeg" className="w-[90px] h-[105px] rounded-[10px] object-cover shadow-xl border-2 border-white/20" />
                                    </div>

                                    <div className="text-center mt-3 text-white">
                                        <h1 className="text-[22px] font-extrabold leading-none">Minh Tam Nghiemová</h1>
                                        <p className="text-[14px] font-semibold opacity-90 mt-1">NEWTON University</p>
                                    </div>

                                    <div className="grid grid-cols-2 mt-5 px-8 text-white">
                                        <div className="flex flex-col items-center border-r border-white/20">
                                            <span className="text-[#005a5c] text-[9px] font-bold uppercase">Validity</span>
                                            <span className="text-[15px] font-black">12/2026</span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="text-[#005a5c] text-[9px] font-bold uppercase">Born</span>
                                            <span className="text-[15px] font-black">31/05/2003</span>
                                        </div>
                                    </div>

                                    <div className="flex-1 flex items-end justify-center pb-8">
                                        <div className="bg-white p-2 rounded-[12px]">
                                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=ISIC" className="w-20 h-20" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="mt-4 pb-12 flex flex-col items-center gap-4">
                            <div className="flex gap-2">
                                <div className="w-2 h-2 rounded-full bg-[#43c4c7]" />
                                <div className="w-2 h-2 rounded-full bg-white/20" />
                                <div className="w-2 h-2 rounded-full bg-white/20" />
                            </div>
                            <div className="w-[140px] h-14 bg-white/10 rounded-full border border-white/20 flex items-center justify-around px-2 backdrop-blur-md">
                                <button className="w-10 h-10 rounded-full bg-[#5d3fd3] flex items-center justify-center text-white">
                                    <i data-lucide="credit-card" className="w-5 h-5"></i>
                                </button>
                                <button className="text-white/50">
                                    <i data-lucide="user" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Inicializace ikon
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
